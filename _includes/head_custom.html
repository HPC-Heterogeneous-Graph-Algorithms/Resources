<!-- Force browser to check for updates -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
/* Sort indicators */
.sortable-table th {
  cursor: pointer;
  user-select: none;
  position: relative;
  padding-right: 1.4rem !important;
}
.sortable-table th:hover { background: rgba(148, 163, 184, 0.12); }
.sortable-table th::after {
  content: " ⇅";
  font-size: 0.72em;
  opacity: 0.35;
  position: absolute;
  right: 0.45rem;
}
.sortable-table th[aria-sort=ascending]::after { content: " ▲"; opacity: 0.8; }
.sortable-table th[aria-sort=descending]::after { content: " ▼"; opacity: 0.8; }

/* Larger commands in docs */
.main-content pre {
  font-size: 1rem !important;
  line-height: 1.6;
}
.main-content pre code { font-size: 0.98rem !important; }
.main-content :not(pre) > code { font-size: 0.92em !important; }
</style>
